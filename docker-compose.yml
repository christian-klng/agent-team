# Agent Team — Deployment für Coolify (Docker-Compose-Ressource).
# In Coolify: dieses Compose-File als Ressource anlegen, Domain auf den
# web-Service (Port 3000) legen, Env-Variablen im Coolify-UI setzen.
services:
  web:
    # Vorgebautes Image aus GitHub Actions (.github/workflows/docker-build.yml) —
    # der Server baut nicht selbst (zu wenig RAM auf kleinen Instanzen).
    image: ghcr.io/christian-klng/agent-team-web:latest
    environment:
      DATABASE_URL: postgres://agentteam:${POSTGRES_PASSWORD}@postgres:5432/agentteam
      REDIS_URL: redis://redis:6379
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY}
      LITELLM_BASE_URL: ${LITELLM_BASE_URL-http://litellm:4000}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      # Erst-Nutzer: wird beim ersten Start angelegt, wenn noch keiner existiert.
      SEED_USER_EMAIL: ${SEED_USER_EMAIL:-}
      SEED_USER_PASSWORD: ${SEED_USER_PASSWORD:-}
      SEED_USER_NAME: ${SEED_USER_NAME:-}
    expose:
      - "3000"
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  worker:
    image: ghcr.io/christian-klng/agent-team-worker:latest
    environment:
      DATABASE_URL: postgres://agentteam:${POSTGRES_PASSWORD}@postgres:5432/agentteam
      REDIS_URL: redis://redis:6379
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY}
      # In Coolify auf leeren Wert setzen, um das Gateway zu umgehen
      # (dann greift ANTHROPIC_API_KEY direkt).
      LITELLM_BASE_URL: ${LITELLM_BASE_URL-http://litellm:4000}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AGENT_DATA_DIR: /data
      CLAUDE_CONFIG_DIR: /data/claude
    volumes:
      - agent_data:/data
    depends_on:
      - postgres
      - redis
      - litellm
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: agentteam
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: agentteam
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      CORTECS_API_KEY: ${CORTECS_API_KEY:-}
      # Muss explizit gesetzt sein: Coolify injiziert alle UI-Env-Variablen in
      # JEDEN Service, und der (leere, nicht löschbare) DATABASE_URL-Eintrag im
      # UI ließ LiteLLM beim Start sterben ("unsupported scheme"). Der Wert hier
      # gewinnt gegen die Injektion; LiteLLM legt eigene Tabellen (LiteLLM_*)
      # in der App-Datenbank an.
      DATABASE_URL: postgresql://agentteam:${POSTGRES_PASSWORD}@postgres:5432/agentteam
    depends_on:
      - postgres
    # Inline-Config statt Bind-Mount: Coolify setzt dieses Compose-File ohne
    # Repo-Checkout ein — ein Bind-Mount auf ./scripts/... existiert dort nicht,
    # Docker legt dann ein leeres Verzeichnis an und LiteLLM crash-loopt
    # (IsADirectoryError). Referenzkopie: scripts/litellm/config.yaml.
    configs:
      - source: litellm_config
        target: /app/config.yaml
    expose:
      - "4000"
    restart: unless-stopped

configs:
  litellm_config:
    content: |
      model_list:
        - model_name: claude-sonnet-4-5
          litellm_params:
            model: openrouter/anthropic/claude-sonnet-4.5
            api_key: os.environ/OPENROUTER_API_KEY

        - model_name: claude-haiku-4-5
          litellm_params:
            model: openrouter/anthropic/claude-haiku-4.5
            api_key: os.environ/OPENROUTER_API_KEY

        - model_name: claude-opus-4-8
          litellm_params:
            model: openrouter/anthropic/claude-opus-4.8
            api_key: os.environ/OPENROUTER_API_KEY

      litellm_settings:
        drop_params: true

      general_settings:
        master_key: os.environ/LITELLM_MASTER_KEY

volumes:
  pg_data:
  redis_data:
  agent_data:
